name: CI (typecheck + build)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Backend — install, generate, typecheck, build
        working-directory: backend
        run: |
          npm ci || npm install
          npx prisma generate
          npm run typecheck
          npm run build

      - name: Frontend — install, typecheck, build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci || npm install
          npm run typecheck
          npm run build
