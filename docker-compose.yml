services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memo
      POSTGRES_USER: memo
      POSTGRES_PASSWORD: memo_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo -d memo"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://memo:memo_pass@db:5432/memo
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 8h
      PORT: "3000"
      APP_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
